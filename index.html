import { getFirestore, doc, getDoc, collection, getDocs, addDoc, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyANyqDudAYNjZACFNlbwMVUlVVwrEKNNcA",
    authDomain: "ugtraveller-writers.firebaseapp.com",
    projectId: "ugtraveller-writers",
    storageBucket: "ugtraveller-writers.firebasestorage.app",
    messagingSenderId: "517529017438",
    appId: "1:517529017438:web:341c7d5036705ee685a8cf"
};

const app = initializeApp(firebaseConfig);

// ══════════════════════════════════
// SPA ROUTER  — ?page=slug
// ══════════════════════════════════
function getSlug() {
    return new URLSearchParams(window.location.search).get("page") || "home";
}
function navigate(slug) {
    history.pushState({ slug }, "", slug === "home" ? "?" : "?page=" + slug);
    showPage(slug);
}
window.addEventListener("popstate", e => showPage(e.state?.slug || getSlug()));

function showPage(slug) {
    document.querySelectorAll(".spa-page").forEach(p => p.classList.remove("is-active"));
    if (slug === "home") {
        document.getElementById("page-home").classList.add("is-active");
        return;
    }
    const existing = document.querySelector(`.spa-page[data-page="${slug}"]`);
    if (existing) { existing.classList.add("is-active"); return; }
    renderDynamicPage(slug);
}

// ══════════════════════════════════
// SECTION RENDERERS
// ══════════════════════════════════
function renderSection(sec) {
    const id = sec.id || ("sec-" + Math.random().toString(36).slice(2));
    switch (sec.type) {
        case "intro":
            return `<section class="intro grid">
                <div class="intro-content"><p>${sec.html || ""}</p></div>
            </section>`;

        case "text_block":
            return `<section class="section text-block grid">
                <h2 class="section-title text-block-title">${sec.title || ""}</h2>
                <div class="text-block-body">${sec.body || ""}</div>
            </section>`;

        case "articles":
            return `<section class="section grid">
                <h2 class="section-title">${sec.title || "Articles"}</h2>
                <button class="section-filters-button">Filters</button>
                <div class="section-filters-container"><form class="section-filters">
                    <fieldset class="section-filters-column" id="dyn-art-topics-${id}"></fieldset>
                    <fieldset class="section-filters-column" id="dyn-art-langs-${id}"></fieldset>
                </form></div>
                <div class="section-content" id="dyn-art-list-${id}" data-async="articles" data-sec="${id}"></div>
            </section>`;

        case "translations":
            return `<section class="section grid">
                <h2 class="section-title">${sec.title || "Translations"}</h2>
                <button class="section-filters-button">Filters</button>
                <div class="section-filters-container"><form class="section-filters">
                    <fieldset class="section-filters-column" id="dyn-tr-topics-${id}"></fieldset>
                    <fieldset class="section-filters-column" id="dyn-tr-langs-${id}"></fieldset>
                </form></div>
                <div class="section-content" id="dyn-tr-list-${id}" data-async="translations" data-sec="${id}"></div>
            </section>`;

        case "apply":
            return `<section class="section grid">
                <h2 class="section-title">${sec.title || "Write for Us"}</h2>
                <div class="section-content"><div>${sec.introHtml || ""}</div></div>
            </section>`;

        case "contacts":
            return `<section class="section grid">
                <h2 class="section-title">Contacts</h2>
                <div class="section-content">
                    <a class="contacts-mail" href="mailto:${sec.email||""}">${sec.email||""}</a>
                    <ul class="contacts-links">${(sec.links||[]).map(l=>`<li class="contacts-link"><a href="${l.url}" target="_blank">${l.label}</a></li>`).join("")}</ul>
                    ${sec.profileImage ? `<img class="contacts-profile" src="${sec.profileImage}" alt="">` : ""}
                </div>
            </section>`;

        default: return "";
    }
}

async function renderDynamicPage(slug) {
    const snap = await getDoc(doc(db, "pages", slug));
    const container = document.getElementById("dynamic-pages-container");
    const div = document.createElement("div");
    div.className = "spa-page is-active";
    div.setAttribute("data-page", slug);

    if (!snap.exists()) {
        div.innerHTML = `<section class="intro grid"><div class="intro-content"><p>Page not found.</p></div></section>`;
        container.appendChild(div);
        return;
    }

    const sections = (snap.data().sections || []).sort((a, b) => (a.order||0) - (b.order||0));
    div.innerHTML = sections.map(renderSection).join("");
    container.appendChild(div);

    // Hydrate async sections
    div.querySelectorAll("[data-async='articles']").forEach(el => populateArticles(el.dataset.sec));
    div.querySelectorAll("[data-async='translations']").forEach(el => populateTranslations(el.dataset.sec));
}

async function populateArticles(id) {
    const list   = document.getElementById(`dyn-art-list-${id}`);
    const topics = document.getElementById(`dyn-art-topics-${id}`);
    const langs  = document.getElementById(`dyn-art-langs-${id}`);
    if (!list) return;
    const snap = await getDocs(query(collection(db, "articles"), orderBy("order","asc")));
    const ts = new Set(), ls = new Set();
    snap.forEach(d => {
        const a = d.data();
        list.innerHTML += `<div class="article item no-line" data-language="${a.language||""}" data-topic="${a.topic||""}">
            <p class="item-title"><a href="${a.url}" target="_blank">${a.title}</a></p>
            <p class="item-subtitle">${a.subtitle}</p></div>`;
        (a.topic||"").split(",").map(t=>t.trim()).filter(Boolean).forEach(t=>ts.add(t));
        (a.language||"").split(",").map(l=>l.trim()).filter(Boolean).forEach(l=>ls.add(l));
    });
    ts.forEach(t => { topics.innerHTML += `<input type="checkbox" id="a-t-${id}-${t}" name="at" value="${t}"><label class="filter" for="a-t-${id}-${t}">${t}</label>`; });
    ls.forEach(l => { langs.innerHTML  += `<input type="checkbox" id="a-l-${id}-${l}" name="al" value="${l}"><label class="filter" for="a-l-${id}-${l}">${l}</label>`; });
}

async function populateTranslations(id) {
    const list   = document.getElementById(`dyn-tr-list-${id}`);
    const topics = document.getElementById(`dyn-tr-topics-${id}`);
    const langs  = document.getElementById(`dyn-tr-langs-${id}`);
    if (!list) return;
    const snap = await getDocs(query(collection(db, "translations"), orderBy("order","asc")));
    const ts = new Set(), ls = new Set();
    snap.forEach(d => {
        const t = d.data();
        list.innerHTML += `<div class="translation item" data-language="${t.language||""}" data-topic="${t.topic||""}">
            <div class="item-content">
                <img class="item-cover" src="${t.coverImage||""}" alt="">
                <div class="item-info">
                    <p class="item-title"><a href="${t.url}" target="_blank">${t.title}</a></p>
                    <p class="item-author">${t.author}</p>
                    <p class="item-subtitle">${t.subtitle}</p>
                </div>
            </div>
            <p class="item-subtitle">${t.subtitle}</p></div>`;
        (t.topic||"").split(",").map(x=>x.trim()).filter(Boolean).forEach(x=>ts.add(x));
        (t.language||"").split(",").map(x=>x.trim()).filter(Boolean).forEach(x=>ls.add(x));
    });
    ts.forEach(t => { topics.innerHTML += `<input type="checkbox" id="t-t-${id}-${t}" name="tt" value="${t}"><label class="filter" for="t-t-${id}-${t}">${t}</label>`; });
    ls.forEach(l => { langs.innerHTML  += `<input type="checkbox" id="t-l-${id}-${l}" name="tl" value="${l}"><label class="filter" for="t-l-${id}-${l}">${l}</label>`; });
}

// ══════════════════════════════════
// HOME PAGE LOADERS
// ══════════════════════════════════
async function loadSettings() {
    const snap = await getDoc(doc(db, "settings", "site"));
    if (!snap.exists()) return;
    const d = snap.data();
    if (d.siteName) {
        document.getElementById("page-title").textContent = d.siteName;
        document.getElementById("site-name").textContent  = d.siteName;
        ["meta-name","meta-twitter-title","meta-og-title","meta-og-sitename"].forEach(id =>
            document.getElementById(id)?.setAttribute("content", d.siteName));
    }
    if (d.metaDescription) {
        ["meta-description","meta-itemprop-description","meta-twitter-description","meta-og-description"].forEach(id =>
            document.getElementById(id)?.setAttribute("content", d.metaDescription));
    }
    if (d.faviconUrl) {
        ["favicon-png","favicon-ico","favicon-svg","favicon-apple"].forEach(id =>
            document.getElementById(id)?.setAttribute("href", d.faviconUrl));
    }
    if (d.footerText)   document.getElementById("footer-text").textContent = d.footerText;
    if (d.contactEmail) {
        const el = document.getElementById("contacts-email");
        el.textContent = d.contactEmail;
        el.href = "mailto:" + d.contactEmail;
    }
    if (d.profileImage) document.getElementById("contacts-profile-img").src = d.profileImage;
}

async function loadMenu() {
    const snap = await getDoc(doc(db, "settings", "menu"));
    if (!snap.exists()) return;
    const container = document.getElementById("menu-links");
    container.innerHTML = "";
    (snap.data().items || []).forEach(item => {
        const a = document.createElement("a");
        a.className   = "menu-item";
        a.textContent = item.label;
        a.href        = item.href || "#";
        // SPA page links use ?page= format
        if (item.href && item.href.startsWith("?page=")) {
            a.addEventListener("click", e => {
                e.preventDefault();
                navigate(new URLSearchParams(item.href.slice(1)).get("page"));
            });
        }
        container.appendChild(a);
    });
}

async function loadIntro() {
    const snap = await getDoc(doc(db, "settings", "intro"));
    if (snap.exists()) document.getElementById("intro-text").innerHTML = snap.data().html || "";
}

async function loadApplySection() {
    const snap = await getDoc(doc(db, "settings", "apply"));

    const d = snap.data();
    if (d.title)     document.getElementById("apply-title").textContent = d.title;

async function loadContactLinks() {
    const snap = await getDoc(doc(db, "settings", "contacts"));

    const ul = document.getElementById("contacts-links");
    ul.innerHTML = "";
    (snap.data().links || []).forEach(link => {

        li.innerHTML = `<a href="${link.url}" target="_blank">${link.label}</a>`;

    const ts = new Set(), ls = new Set();

    snap.forEach(d => {
        const a = d.data();
        list.innerHTML += `<div class="article item" data-language="${a.language||""}" data-topic="${a.topic||""}">
            <p class='item-title'><a href='${a.url}' target='_blank'>${a.title}</a></p>
            <p class='item-subtitle'>${a.subtitle}</p></div>`;
        (a.topic||"").split(",").map(t=>t.trim()).filter(Boolean).forEach(t=>ts.add(t));
        (a.language||"").split(",").map(l=>l.trim()).filter(Boolean).forEach(l=>ls.add(l));

    tFilt.innerHTML = "";
    ts.forEach(t => { const id="articles-"+t.replace(/\s+/g,"-").toLowerCase(); tFilt.innerHTML+=`<input type="checkbox" id="${id}" name="articles-topics" value="${t}"><label class="filter" for="${id}">${t}</label>`; });

    ls.forEach(l => { const id="articles-lang-"+l.replace(/\s+/g,"-").toLowerCase(); lFilt.innerHTML+=`<input type="checkbox" id="${id}" name="articles-languages" value="${l}"><label class="filter" for="${id}">${l}</label>`; });

async function setupForm() {
    const form     = document.getElementById("writer-application-form");
    const feedback = document.getElementById("apply-form-feedback");
    const btn      = document.getElementById("apply-submit-btn");
    const ejsSnap  = await getDoc(doc(db, "settings", "emailjs"));
    const ejsCfg   = ejsSnap.exists() ? ejsSnap.data() : {};
    if (ejsCfg.publicKey) {
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
        s.onload = () => emailjs.init({ publicKey: ejsCfg.publicKey });
        document.head.appendChild(s);
    }
    form.addEventListener("submit", async e => {
        e.preventDefault();
        btn.disabled = true; btn.textContent = "Submitting…";
        const payload = {
            name: document.getElementById("apply-name").value,
            email: document.getElementById("apply-email").value,
            topic: document.getElementById("apply-topic").value,
            pitch: document.getElementById("apply-pitch").value,
            status: "pending",
            submittedAt: new Date().toISOString()
        };
        try {
            await addDoc(collection(db, "applications"), payload);
            if (ejsCfg.publicKey && ejsCfg.serviceId && ejsCfg.notifyTemplateId) {
                await emailjs.send(ejsCfg.serviceId, ejsCfg.notifyTemplateId, {
                    applicant_name: payload.name, applicant_email: payload.email,
                    topic: payload.topic, pitch: payload.pitch
                });
            }
            feedback.style.display = "block";
            feedback.textContent = "Application submitted! We'll be in touch soon.";
            form.reset();
        } catch(err) {
            console.error(err);
            feedback.style.display = "block";
            feedback.textContent = "Something went wrong. Please try again.";
        } finally {
            btn.disabled = false; btn.textContent = "Submit Application";
        }
    });
}

// ══════════════════════════════════
// CUSTOM TAG SELECTOR LOGIC
// ══════════════════════════════════
const topicDropdown = document.getElementById('apply-topic-dropdown');
const tagsContainer = document.getElementById('selected-topics-container');
const hiddenTopicInput = document.getElementById('apply-topic');
let selectedTopics = [];

if (topicDropdown) {
    // When a user selects an option from the dropdown
    topicDropdown.addEventListener('change', (e) => {
        const val = e.target.value;
        // If it's valid and not already selected, add it
        if (val && !selectedTopics.includes(val)) {
            selectedTopics.push(val);
            renderTags();
        }
        // Reset the dropdown back to "Select a category..."
        topicDropdown.selectedIndex = 0;
    });

    // When a user clicks the 'X' on a tag
    tagsContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('topic-tag-remove')) {
            const valToRemove = e.target.dataset.value;
            // Remove it from the array
            selectedTopics = selectedTopics.filter(t => t !== valToRemove);
            renderTags();
        }
    });
}

// Draw the tags on the screen and update the hidden input
function renderTags() {
    tagsContainer.innerHTML = selectedTopics.map(topic => 
        `<span class="topic-tag">${topic} <span class="topic-tag-remove" data-value="${topic}">✕</span></span>`
    ).join('');
    
    // Update the hidden input with a clean, comma-separated string for Firebase
    hiddenTopicInput.value = selectedTopics.join(', ');
}

// ── INIT ─────────────────────────────────────────────────────────────
Promise.all([
    loadSettings(), loadMenu(), loadIntro(), loadApplySection(),
    loadContactLinks(), loadArticles(), loadTranslations(), setupForm()
]).catch(console.error);

// Route on load
const initialSlug = getSlug();
if (initialSlug !== "home") renderDynamicPage(initialSlug);
</script>

<script>
// Accordion Drawer Logic
document.addEventListener('click', function(e) {
    // Check if the click happened inside a translation item
    const drawerItem = e.target.closest('.translation.item');
    
    if (drawerItem) {
        // If the user specifically clicked the <a> link, let them go to the URL
        if (e.target.tagName.toLowerCase() === 'a') {
            return; 
        }
        
        // Otherwise, stop text from highlighting and toggle the drawer open/closed
        e.preventDefault();
        drawerItem.classList.toggle('is-open');
    }
});
</script>

<script src="js/site.js"></script>
</body>
</html>
