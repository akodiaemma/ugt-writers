<!DOCTYPE html>
<html lang="en" id="home" data-scheme="white">
<head>
    
    <!-- Meta Tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="theme-color" content="#fff">
    
    <!-- Preload the fonts -->
    <link rel="preload" href="fonts/NHaasGroteskDSPro-65Md.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <!-- Robots -->
    <meta name="robots" content="index, follow">
        
    <!-- Social Images -->
    <meta id="meta-social-image" content="" itemprop="image">
    <meta id="meta-twitter-image" content="" name="twitter:image">
    <meta id="meta-og-image" content="" property="og:image">
    
    <!-- Titles -->
    <meta id="meta-name" content="UG Traveller – Writers" itemprop="name">
    <meta id="meta-twitter-title" content="UG Traveller – Writers" name="twitter:title">
    <meta id="meta-og-title" content="UG Traveller – Writers" property="og:title">
    <meta id="meta-og-sitename" content="UG Traveller – Writers" property="og:site_name">

    <!-- Descriptions -->
    <meta id="meta-description" content="" name="description">
    <meta id="meta-itemprop-description" content="" itemprop="description">
    <meta id="meta-twitter-description" content="" name="twitter:description">
    <meta id="meta-og-description" content="" property="og:description">

    <!-- Facebook:extra -->
    <meta property="og:url" content="">
    <meta property="og:type" content="website">

    <!-- Page Title -->
    <title id="page-title">UG Traveller – Writers</title>

    <!-- Favicon -->
    <link id="favicon-png" rel="icon" type="image/png" sizes="96x96" href="images/favicon.ico">
    <link id="favicon-ico" rel="icon shortcut" href="images/favicon.ico">
    <link id="favicon-svg" rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link id="favicon-apple" rel="apple-touch-icon" type="image/png" sizes="180x180" href="images/favicon.ico">

    <!-- Stylesheet -->
    <link href="css/main.css" rel="stylesheet">
</head>
<body>

    <div class="lines grid">
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <header class="header">
        <h1 class="header-title"><a href="#home" id="site-name">UG Traveller – Writers</a></h1>
        <button class="header-button js-menu-button">MENU</button>
    </header>

    <nav class="menu js-menu-container">
        <div class="menu-inner grid">
            
            <div class="menu-top" id="menu-links">
                <!-- Populated by Firebase -->
            </div>

            <div class="menu-bottom">
                <p>Pick your <br>background color</p>

                <div class="schemes">
                    <button class="scheme js-scheme-button scheme-active" value="white">Plain white</button>
                    <button class="scheme js-scheme-button" value="gray">Concrete grey</button>
                    <button class="scheme js-scheme-button" value="black">Deep black</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- SPA Page Container -->
    <div id="spa-pages">

        <!-- ===== HOME PAGE ===== -->
        <div class="spa-page" data-page="home">

            <section class="intro grid">
                <div class="intro-content">
                    <p id="intro-text"><!-- Populated by Firebase --></p>
                </div>
            </section>

            <section class="section grid" id="articles">
                <h2 class="section-title" id="articles-title">Articles</h2>

                <button class="section-filters-button">Filters</button>

                <div class="section-filters-container">
                    <form class="section-filters">
                        <fieldset class="section-filters-column" id="articles-topic-filters">
                            <!-- Populated by Firebase -->
                        </fieldset>
                        <fieldset class="section-filters-column" id="articles-language-filters">
                            <!-- Populated by Firebase -->
                        </fieldset>
                    </form>
                </div>

                <div class="section-content" id="articles-list">
                    <!-- Populated by Firebase -->
                </div>
            </section>

            <section class="section grid" id="translations">
                <h2 class="section-title" id="translations-title">Translations</h2>

                <button class="section-filters-button">Filters</button>

                <div class="section-filters-container">
                    <form class="section-filters">
                        <fieldset class="section-filters-column" id="translations-topic-filters">
                            <!-- Populated by Firebase -->
                        </fieldset>
                        <fieldset class="section-filters-column" id="translations-language-filters">
                            <!-- Populated by Firebase -->
                        </fieldset>
                    </form>
                </div>

                <div class="section-content" id="translations-list">
                    <!-- Populated by Firebase -->
                </div>
            </section>

            <section class="section grid" id="apply">
                <h2 class="section-title" id="apply-title">Write for Us</h2>
                <div class="section-content">
                    <div id="apply-intro-text"><!-- Populated by Firebase --></div>

                    <form class="section-filters" id="writer-application-form" style="display:block; margin-top: 2rem;">
                        <div class="section-filters-column" style="width:100%;">

                            <div style="margin-bottom:1.5rem;">
                                <label class="filter" for="apply-name" style="display:block; margin-bottom:0.5rem;">Full Name</label>
                                <input type="text" id="apply-name" name="name" required placeholder="Your full name" style="width:100%; padding:0.75rem; background:transparent; border:1px solid currentColor; font-family:inherit; font-size:1rem; color:inherit;">
                            </div>

                            <div style="margin-bottom:1.5rem;">
                                <label class="filter" for="apply-email" style="display:block; margin-bottom:0.5rem;">Email Address</label>
                                <input type="email" id="apply-email" name="email" required placeholder="your@email.com" style="width:100%; padding:0.75rem; background:transparent; border:1px solid currentColor; font-family:inherit; font-size:1rem; color:inherit;">
                            </div>

                            <div style="margin-bottom:1.5rem;">
                                <label class="filter" for="apply-topic" style="display:block; margin-bottom:0.5rem;">What would you like to write about?</label>
                                <select id="apply-topic" name="topic" required style="width:100%; padding:0.75rem; background:transparent; border:1px solid currentColor; font-family:inherit; font-size:1rem; color:inherit; appearance:none;">
                                    <option value="">Select a category</option>
                                    <option value="Inspiration">Inspiration</option>
                                    <option value="Style & Culture">Style &amp; Culture</option>
                                    <option value="Food & Drinks">Food &amp; Drinks</option>
                                    <option value="Women Travelling Uganda">Women Travelling Uganda</option>
                                    <option value="Wellness & Spas">Wellness &amp; Spas</option>
                                    <option value="News & Advice">News &amp; Advice</option>
                                    <option value="Events">Events</option>
                                    <option value="Podcasts">Podcasts</option>
                                    <option value="Videos">Videos</option>
                                    <option value="Traveller's Directory">Traveller's Directory</option>
                                </select>
                            </div>

                            <div style="margin-bottom:1.5rem;">
                                <label class="filter" for="apply-pitch" style="display:block; margin-bottom:0.5rem;">Tell us what you'd write about</label>
                                <textarea id="apply-pitch" name="pitch" required rows="5" placeholder="Give us a brief description of the story or topic you have in mind..." style="width:100%; padding:0.75rem; background:transparent; border:1px solid currentColor; font-family:inherit; font-size:1rem; color:inherit; resize:vertical;"></textarea>
                            </div>

                            <button type="submit" id="apply-submit-btn" class="scheme" style="cursor:pointer;">Submit Application</button>
                            <p id="apply-form-feedback" style="margin-top:1rem; display:none;"></p>
                        </div>
                    </form>
                </div>
            </section>

            <section class="section grid" id="contacts">
                <h2 class="section-title">Contacts</h2>
                <div class="section-content">
                    <a class="contacts-mail" id="contacts-email" href="mailto:editor@ugtraveller.com">editor@ugtraveller.com</a>

                    <ul class="contacts-links" id="contacts-links">
                        <!-- Populated by Firebase -->
                    </ul>

                    <img class="contacts-profile" lazyload src="images/gm.jpg" alt="" id="contacts-profile-img">
                </div>
            </section>

        </div><!-- end home page -->

        <!-- ===== ADDITIONAL PAGES RENDERED HERE DYNAMICALLY ===== -->
        <div id="dynamic-pages-container"></div>

    </div><!-- end spa-pages -->

    <footer class="footer grid">
        <div class="footer-content">
            <span id="footer-text">UG Traveller – Writers</span>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────
    const firebaseConfig = {
  apiKey: "AIzaSyANyqDudAYNjZACFNlbwMVUlVVwrEKNNcA",
  authDomain: "ugtraveller-writers.firebaseapp.com",
  projectId: "ugtraveller-writers",
  storageBucket: "ugtraveller-writers.firebasestorage.app",
  messagingSenderId: "517529017438",
  appId: "1:517529017438:web:341c7d5036705ee685a8cf"
};
        // ─────────────────────────────────────────────────────────────────

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ── LOAD SITE SETTINGS ───────────────────────────────────────────
        async function loadSettings() {
            const snap = await getDoc(doc(db, "settings", "site"));
            if (!snap.exists()) return;
            const d = snap.data();

            if (d.siteName) {
                document.getElementById("page-title").textContent = d.siteName;
                document.getElementById("site-name").textContent = d.siteName;
                document.getElementById("meta-name").setAttribute("content", d.siteName);
                document.getElementById("meta-twitter-title").setAttribute("content", d.siteName);
                document.getElementById("meta-og-title").setAttribute("content", d.siteName);
                document.getElementById("meta-og-sitename").setAttribute("content", d.siteName);
            }
            if (d.metaDescription) {
                document.getElementById("meta-description").setAttribute("content", d.metaDescription);
                document.getElementById("meta-itemprop-description").setAttribute("content", d.metaDescription);
                document.getElementById("meta-twitter-description").setAttribute("content", d.metaDescription);
                document.getElementById("meta-og-description").setAttribute("content", d.metaDescription);
            }
            if (d.faviconUrl) {
                document.getElementById("favicon-png").setAttribute("href", d.faviconUrl);
                document.getElementById("favicon-ico").setAttribute("href", d.faviconUrl);
                document.getElementById("favicon-svg").setAttribute("href", d.faviconUrl);
                document.getElementById("favicon-apple").setAttribute("href", d.faviconUrl);
            }
            if (d.footerText) document.getElementById("footer-text").textContent = d.footerText;
            if (d.contactEmail) {
                const el = document.getElementById("contacts-email");
                el.textContent = d.contactEmail;
                el.href = "mailto:" + d.contactEmail;
            }
            if (d.profileImage) document.getElementById("contacts-profile-img").src = d.profileImage;
        }

        // ── LOAD MENU ────────────────────────────────────────────────────
        async function loadMenu() {
            const snap = await getDoc(doc(db, "settings", "menu"));
            if (!snap.exists()) return;
            const { items } = snap.data();
            const container = document.getElementById("menu-links");
            container.innerHTML = "";
            (items || []).forEach(item => {
                const a = document.createElement("a");
                a.className = "menu-item";
                a.href = item.href;
                a.textContent = item.label;
                container.appendChild(a);
            });
        }

        // ── LOAD INTRO ───────────────────────────────────────────────────
        async function loadIntro() {
            const snap = await getDoc(doc(db, "settings", "intro"));
            if (!snap.exists()) return;
            document.getElementById("intro-text").innerHTML = snap.data().html || "";
        }

        // ── LOAD APPLY SECTION ───────────────────────────────────────────
        async function loadApplySection() {
            const snap = await getDoc(doc(db, "settings", "apply"));
            if (!snap.exists()) return;
            const d = snap.data();
            if (d.title) document.getElementById("apply-title").textContent = d.title;
            if (d.introHtml) document.getElementById("apply-intro-text").innerHTML = d.introHtml;
        }

        // ── LOAD CONTACTS LINKS ──────────────────────────────────────────
        async function loadContactLinks() {
            const snap = await getDoc(doc(db, "settings", "contacts"));
            if (!snap.exists()) return;
            const { links } = snap.data();
            const ul = document.getElementById("contacts-links");
            ul.innerHTML = "";
            (links || []).forEach(link => {
                const li = document.createElement("li");
                li.className = "contacts-link";
                li.innerHTML = `<a href="${link.url}" target="_blank">${link.label}</a>`;
                ul.appendChild(li);
            });
        }

        // ── LOAD ARTICLES ────────────────────────────────────────────────
        async function loadArticles() {
            const snap = await getDocs(query(collection(db, "articles"), orderBy("order", "asc")));
            const list = document.getElementById("articles-list");
            const topicFilters = document.getElementById("articles-topic-filters");
            const langFilters = document.getElementById("articles-language-filters");
            const topics = new Set(), langs = new Set();

            list.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const div = document.createElement("div");
                div.className = "article item";
                div.setAttribute("data-language", d.language || "");
                div.setAttribute("data-topic", d.topic || "");
                div.innerHTML = `<p class='item-title'><a href='${d.url}' target='_blank'>${d.title}</a></p><p class='item-subtitle'>${d.subtitle}</p>`;
                list.appendChild(div);
                (d.topic || "").split(",").map(t => t.trim()).filter(Boolean).forEach(t => topics.add(t));
                (d.language || "").split(",").map(l => l.trim()).filter(Boolean).forEach(l => langs.add(l));
            });

            topicFilters.innerHTML = "";
            topics.forEach(t => {
                const id = "articles-" + t.replace(/\s+/g, "-").toLowerCase();
                topicFilters.innerHTML += `<input type="checkbox" id="${id}" name="articles-topics" value="${t}"><label class="filter" for="${id}">${t}</label>`;
            });
            langFilters.innerHTML = "";
            langs.forEach(l => {
                const id = "articles-lang-" + l.replace(/\s+/g, "-").toLowerCase();
                langFilters.innerHTML += `<input type="checkbox" id="${id}" name="articles-languages" value="${l}"><label class="filter" for="${id}">${l}</label>`;
            });
        }

        // ── LOAD TRANSLATIONS ────────────────────────────────────────────
        async function loadTranslations() {
            const snap = await getDocs(query(collection(db, "translations"), orderBy("order", "asc")));
            const list = document.getElementById("translations-list");
            const topicFilters = document.getElementById("translations-topic-filters");
            const langFilters = document.getElementById("translations-language-filters");
            const topics = new Set(), langs = new Set();

            list.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const div = document.createElement("div");
                div.className = "translation item";
                div.setAttribute("data-language", d.language || "");
                div.setAttribute("data-topic", d.topic || "");
                div.innerHTML = `
                    <div class="item-content">
                        <img class="item-cover" src="${d.coverImage || ''}" alt="">
                        <div class="item-info">
                            <p class='item-title'><a href='${d.url}' target='_blank'>${d.title}</a></p>
                            <p class='item-author'>${d.author}</p>
                            <p class='item-subtitle'>${d.subtitle}</p>
                        </div>
                    </div>
                    <p class='item-subtitle'>${d.subtitle}</p>`;
                list.appendChild(div);
                (d.topic || "").split(",").map(t => t.trim()).filter(Boolean).forEach(t => topics.add(t));
                (d.language || "").split(",").map(l => l.trim()).filter(Boolean).forEach(l => langs.add(l));
            });

            topicFilters.innerHTML = "";
            topics.forEach(t => {
                const id = "translations-" + t.replace(/\s+/g, "-").toLowerCase();
                topicFilters.innerHTML += `<input type="checkbox" id="${id}" name="translations-topics" value="${t}"><label class="filter" for="${id}">${t}</label>`;
            });
            langFilters.innerHTML = "";
            langs.forEach(l => {
                const id = "translations-lang-" + l.replace(/\s+/g, "-").toLowerCase();
                langFilters.innerHTML += `<input type="checkbox" id="${id}" name="translations-languages" value="${l}"><label class="filter" for="${id}">${l}</label>`;
            });
        }

        // ── APPLICATION FORM SUBMIT ──────────────────────────────────────
        async function setupForm() {
            const form = document.getElementById("writer-application-form");
            const feedback = document.getElementById("apply-form-feedback");
            const btn = document.getElementById("apply-submit-btn");

            // Load EmailJS config from Firestore
            const ejsSnap = await getDoc(doc(db, "settings", "emailjs"));
            const ejsCfg = ejsSnap.exists() ? ejsSnap.data() : {};

            if (ejsCfg.publicKey) {
                const script = document.createElement("script");
                script.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
                script.onload = () => emailjs.init({ publicKey: ejsCfg.publicKey });
                document.head.appendChild(script);
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                btn.disabled = true;
                btn.textContent = "Submitting…";

                const payload = {
                    name: document.getElementById("apply-name").value,
                    email: document.getElementById("apply-email").value,
                    topic: document.getElementById("apply-topic").value,
                    pitch: document.getElementById("apply-pitch").value,
                    status: "pending",
                    submittedAt: new Date().toISOString()
                };

                try {
                    // Save to Firestore applications collection
                    const { addDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
                    await addDoc(collection(db, "applications"), payload);

                    // Notify editor via EmailJS
                    if (ejsCfg.publicKey && ejsCfg.serviceId && ejsCfg.notifyTemplateId) {
                        await emailjs.send(ejsCfg.serviceId, ejsCfg.notifyTemplateId, {
                            applicant_name: payload.name,
                            applicant_email: payload.email,
                            topic: payload.topic,
                            pitch: payload.pitch
                        });
                    }

                    feedback.style.display = "block";
                    feedback.textContent = "Application submitted! We'll be in touch soon.";
                    form.reset();
                } catch (err) {
                    console.error(err);
                    feedback.style.display = "block";
                    feedback.textContent = "Something went wrong. Please try again.";
                } finally {
                    btn.disabled = false;
                    btn.textContent = "Submit Application";
                }
            });
        }

        // ── INIT ─────────────────────────────────────────────────────────
        Promise.all([
            loadSettings(),
            loadMenu(),
            loadIntro(),
            loadApplySection(),
            loadContactLinks(),
            loadArticles(),
            loadTranslations(),
            setupForm()
        ]).catch(console.error);
    </script>

    <!-- Original site JS -->
    <script src="js/site.js"></script>

</body>
</html>
